# ─────────────────────────────────────────────────────────────────────────────
# SLF4J Simple Logger Configuration
# Routes Azure SDK / MSAL logs to a file so they don't clutter the terminal.
# The app's own logs (java.util.logging) still print to the console.
# ─────────────────────────────────────────────────────────────────────────────

# Send SLF4J output to a file instead of System.err
org.slf4j.simpleLogger.logFile=bulkactions-sdk-debug.log

# Default level for all SLF4J loggers (Azure SDK, MSAL, Netty, etc.)
org.slf4j.simpleLogger.defaultLogLevel=info

# Show date/time in log entries
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS

# Show thread name for async debugging
org.slf4j.simpleLogger.showThreadName=true

# Show short logger name for readability
org.slf4j.simpleLogger.showShortLogName=true
